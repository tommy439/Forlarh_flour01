<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard page</title>

    <!-- Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="authMiddleware.js"></script>

    <script>
        // middleware for auth user
        (async () => {
            try {
                const authorized = await isAuthenticated();
                if (!authorized) {
                    // alert('Unauthorized access. Please login first.');
                    window.location.href = 'login.html';
                }

                const authUser = sessionStorage.getItem("user");
                if (authUser) {
                    const user = JSON.parse(authUser);
                    document.getElementById("userName").textContent = user.name || "Folarh Venture";
                    document.getElementById("userEmail").textContent = user.email || "Unknown";
                    document.getElementById("avatar").textContent = (user.name?.charAt(0)?.toUpperCase() + user.name?.split(" ")[1]?.charAt(0)?.toUpperCase()) || "FV";
                    document.getElementById("avatar").style.backgroundColor = "#4f46e5";
                }
            } catch (error) {
                console.error("Auth check failed:", error);
                window.location.href = 'login.html';
            }
        })();

    </script>

    <style>
        :root {
            --bg-color: #f4f6f9;
            --card-bg: #ffffff;
            --text-main: #333333;
            --text-muted: #777777;
            --primary: #4f46e5;
            --success: #10b981;
            --border: #e5e7eb;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            /* background-color: #0f172a;
        min-height: 120vh;
        margin: 0;
        padding: 20px;
        font-family: sans-serif; */
            background-color: var(--bg-color);
            color: var(--text-main);
            padding: 24px;
            /* padding-top: 60px;  */
        }

        .fixed-header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 60px;
            background-color: #050b18;
            border-bottom: 1px solid #1e293b;
            display: flex;
            align-items: center;
            padding: 0 20px;
            z-index: 100;
            justify-content: space-between;
        }

        /* Search Bar */
        .search-container {
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: relative;
            background-color: #f3f4f6;
            border: 1px solid #e5e7eb;
            border-radius: 8px;
            padding: 2px;
            width: 100%;
            max-width: 450px;
            transition: all 0.2s ease;
        }

        .search-container:focus-within {
            background-color: #ffffff;
            border-color: #4f46e5;
            box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1);
        }

        .search-icon {
            width: 18px;
            height: 18px;
            color: #9ca3af;
            margin-left: 12px;
            pointer-events: none;
        }

        .search-input {
            width: 100%;
            border: none;
            background: transparent;
            padding: 8px 12px;
            font-size: 14px;
            color: #1f2937;
            outline: none;
        }

        .search-input::placeholder {
            color: #9ca3af;
        }

        .search-btn {
            background-color: #4f46e5;
            color: #ffffff;
            border: none;
            border-radius: 6px;
            padding: 6px 14px;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            white-space: nowrap;
            transition: background-color 0.15s ease;
        }

        .search-btn:hover {
            background-color: #4338ca;
        }

        .menu-toggle-btn {
            background: none;
            border: none;
            color: #f8fafc;
            font-size: 22px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 8px;
            border-radius: 6px;
            transition: 0.2s;
        }

        .menu-toggle-btn:hover {
            background-color: #1e293b;
        }

        .header-title {
            color: #f8fafc;
            margin-left: 16px;
            font-size: 18px;
            font-weight: 600;
        }

        .sidebar-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-color: rgba(15, 23, 42, 0.7);
            z-index: 200;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.3s ease, visibility 0.3s ease;
        }

        .sidebar-overlay.active {
            opacity: 1;
            visibility: visible;
        }

        .sidebar {
            position: fixed;
            top: 0;
            left: -280px;
            width: 260px;
            height: 100vh;
            background-color: #050b18;
            color: #f8fafc;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 16px;
            box-sizing: border-box;
            border-right: 1px solid #1e293b;
            border-radius: 0 10px 10px 0;
            z-index: 210;
            transition: left 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 4px 0 25px rgba(0, 0, 0, 0.5);
        }

        .sidebar.active {
            left: 0;
        }

        .logo-area {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 8px 8px;
            margin-bottom: 12px;
            background-color: #0f172a;
            border-radius: 10px;
        }

        .close-container {
            display: flex;
            justify-content: flex-end;
            width: 100%;
        }

        .close-sidebar-btn {
            background: none;
            border: none;
            color: #94a3b8;
            font-size: 18px;
            cursor: pointer;
        }

        .close-sidebar-btn:hover {
            color: #ffffff;
        }

        .logo-text {
            font-size: 20px;
            font-weight: bold;
            color: #94a3b8;
        }

        .nav-links {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .nav-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 12px;
            border-radius: 8px;
            color: #94a3b8;
            text-decoration: none;
            font-size: 15px;
            transition: 0.2s;
            cursor: pointer;
        }

        .nav-item-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .nav-item.active {
            background-color: #2563eb;
            color: #ffffff;
        }

        .nav-item:hover:not(.active) {
            background-color: #1e293b;
            color: #ffffff;
        }

        .submenu {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.3s ease-out;
            padding-left: 32px;
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .submenu.open {
            max-height: 200px;
            margin-top: 4px;
            margin-bottom: 8px;
        }

        .submenu-item {
            display: block;
            padding: 8px 12px;
            color: #94a3b8;
            text-decoration: none;
            font-size: 14px;
            border-radius: 6px;
            transition: 0.2s;
        }

        .submenu-item:hover {
            background-color: #1e293b;
            color: #ffffff;
        }

        .dropdown-arrow {
            font-size: 11px;
            transition: transform 0.3s;
        }

        .dropdown-arrow.rotate {
            transform: rotate(180deg);
        }

        .profile-area {
            display: flex;
            align-items: center;
            gap: 12px;
            border-top: 1px solid #1e293b;
            padding-top: 16px;
            padding-left: 8px;
            padding-right: 8px;
        }

        .avatar {
            height: 40px;
            width: 40px;
            border-radius: 50%;
            background-color: #334155;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            font-size: 14px;
        }

        .user-info {
            flex: 1;
            min-width: 0;
        }

        .user-name {
            font-size: 14px;
            font-weight: 500;
            margin: 0;
        }

        .user-email {
            font-size: 12px;
            color: #94a3b8;
            margin: 0;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .main-workspace {
            padding: 30px;
            color: #f8fafc;
        }

        .dashboard {
            display: flex;
            gap: 15px;
            margin: 20px 0;
        }

        .card {
            flex: 1;
            background: white;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }

        .card h3 {
            margin-bottom: 10px;
        }

        .card p {
            font-size: 22px;
            font-weight: bold;
            color: #050b18;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: white;
        }

        th,
        td {
            padding: 12px;
            border: 1px solid #ddd;
            text-align: center;
        }

        th {
            background: #1e293b;
            color: white;
        }


        .low {
            color: orange;
            font-weight: bold;
        }

        .very-low {
            color: red;
            font-weight: bold;
        }

        .out {
            color: darkred;
            font-weight: bold;
        }


        @media screen and (max-width: 992px) {

            .main-content-grid {
                grid-template-columns: 1fr;
            }

            .dashboard-body {
                padding: 0;
            }

            .kpi-grid {
                grid-template-columns: repeat(2, 1fr);
            }

            .search-container {
                max-width: 300px;
            }

            .dashboard-table {
                min-width: 600px;
            }

            .submenu-item {
                display: block;
                padding: 8px 12px;
                color: #94a3b8;
                text-decoration: none;
                font-size: 14px;
                border-radius: 6px;
                transition: 0.2s;
                font-size: smaller;
            }
        }

        @media screen and (max-width:768px) {

            body {
                padding: 15px;
                padding-top: 90px;
            }

            .fixed-header {
                padding: 10px;
                gap: 10px;
            }

            .header-title {
                font-size: 15px;
                margin-left: 8px;
            }

            .search-container {
                max-width: 220px;
            }

            .search-input {
                font-size: 12px;
            }

            .search-btn {
                font-size: 12px;
                padding: 6px 10px;
            }

            .main-workspace {
                padding: 10px;
            }

            .dashboard-body {
                gap: 15px;
            }

            .kpi-grid {
                grid-template-columns: 1fr;
            }

            .card {
                padding: 15px;
            }

            .kpi-value {
                font-size: 22px;
            }

            .dashboard-table {
                min-width: 550px;
            }

            .dashboard-table th,
            .dashboard-table td {
                padding: 10px;
                font-size: 13px;
            }

            .sidebar {
                width: 240px;
            }

            .submenu-item {
                display: block;
                padding: 8px 12px;
                color: #94a3b8;
                text-decoration: none;
                font-size: 14px;
                border-radius: 6px;
                transition: 0.2s;
                font-size: smaller;
            }
        }

        /* small phone */
        @media screen and (max-width:576px) {

            .fixed-header {
                flex-wrap: wrap;
                height: auto;
            }

            .header-title {
                width: 100%;
                text-align: center;
                margin: 5px 0;
            }

            .search-container {
                width: 100%;
                max-width: 100%;
            }

            .search-btn {
                padding: 5px 10px;
            }

            .sidebar {
                width: 220px;
            }

            .logo-text {
                font-size: 16px;
            }

            .nav-item {
                font-size: 14px;
            }

            .kpi-value {
                font-size: 20px;
            }

            .dashboard-table {
                min-width: 500px;
            }

            .status,
            .status1 {
                font-size: 12px;
                width: auto;
            }

            .submenu-item {
                display: block;
                padding: 8px 12px;
                color: #94a3b8;
                text-decoration: none;
                font-size: 14px;
                border-radius: 6px;
                transition: 0.2s;
                font-size: smaller;
            }
        }

        /* very small phone below */
        @media screen and (max-width:400px) {

            body {
                padding: 10px;
                padding-top: 110px;
            }

            .header-title {
                font-size: 13px;
            }

            .menu-toggle-btn {
                font-size: 18px;
            }

            .search-input {
                font-size: 11px;
            }

            .search-btn {
                font-size: 11px;
                padding: 5px 8px;
            }

            .sidebar {
                width: 200px;
            }

            .dashboard-table {
                min-width: 450px;
            }

            .dashboard-table th,
            .dashboard-table td {
                font-size: 11px;
                padding: 8px;
            }

            .card {
                padding: 12px;
            }

            .kpi-value {
                font-size: 18px;
            }

            .submenu-item {
                display: block;
                padding: 8px 12px;
                color: #94a3b8;
                text-decoration: none;
                font-size: 14px;
                border-radius: 6px;
                transition: 0.2s;
                font-size: smaller;
            }
        }
    </style>
</head>

<body>

    <!-- 1. FIXED TOP HEADER -->
    <header class="fixed-header">
        <button class="menu-toggle-btn" id="menuOpenBtn" aria-label="Open Menu">
            <i class="fa-solid fa-bars"></i>
        </button>
        <div class="header-title">Folarh Venture Management</div>

        <div class="search-container">
            <svg class="search-icon" xmlns="http://w3.org" fill="none" viewBox="0 0 24 24" stroke-width="2"
                stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round"
                    d="m21 21-5.197-5.197m0 0A7.5 7.5 0 1 0 5.196 5.196a7.5 7.5 0 0 0 10.604 10.604Z" />
            </svg>
            <input type="text" class="search-input" placeholder="Search transactions, users, or settings...">
            <button type="button" class="search-btn">Search</button>
        </div>

    </header>

    <!-- 2. CLICKABLE BACKDROP OVERLAY -->
    <div class="sidebar-overlay" id="menuOverlay"></div>

    <!-- 3. POP-OUT SIDEBAR -->
    <aside class="sidebar" id="dashboardSidebar">
        <div>
            <!-- Close button inside sidebar -->
            <div class="close-container">
                <button class="close-sidebar-btn" id="menuCloseBtn">✕</button>
            </div>

            <div class="logo-area">
                <i style="color: #94a3b8; font-size: 17px;" class="fa-solid fa-store"></i>
                <span class="logo-text">Folarh venture</span>
            </div>

            <!-- Navigation Links -->
            <nav class="nav-links">
                <!-- Dropdown Main Link -->
                <a href="#" class="nav-item">
                    <div class="nav-item-left"><span>📊</span> Dashboard</div>
                </a>

                <div class="nav-item active" id="productDropdownBtn">
                    <div class="nav-item-left">
                        products
                    </div>
                    <i class="fa-solid fa-chevron-down dropdown-arrow" id="arrowIcon"></i>
                </div>

                <!-- Collapsible Sub-menu Items -->
                <div class="submenu" id="productSubmenu">
                    <a href="createproduct.html" class="submenu-item"><i class="fa-solid fa-plus mr-2 text-xs"></i>
                        Create Product</a>
                    <a href="productslist.html" class="submenu-item"><i class="fa-solid fa-list mr-2 text-xs"></i>
                        Products List</a>

                </div>

                <a href="#" onclick="logout()" class="nav-item">
                    <div class="nav-item-left"><span style="color: red; font-weight: bold;">👥</span> Logout</div>
                </a>

                <!-- <a href="#" class="nav-item">
                <div class="nav-item-left"><span>👥</span> Customers</div>
            </a>
            <a href="#" class="nav-item">
                <div class="nav-item-left"><span>⚙️</span> Settings</div>
            </a> -->
            </nav>
        </div>

        <!-- User Profile Area -->
        <div class="profile-area">
            <div class="avatar" id="avatar">FV</div>
            <div class="user-info">
                <p class="user-name" id="userName"></p>
                <p class="user-email" id="userEmail"></p>
            </div>
        </div>
    </aside>

    <!-- 4. MAIN PAGE DISPLAY AREA -->
    <main class="main-workspace">
        <!-- <h1 class="text-2xl font-bold mb-2">Welcome to your Dashboard</h1> -->
        <!-- <p class="text-slate-400">Click the list icon menu bar (<i class="fa-solid fa-bars"></i>) in the top-left header to open your navigation bar options.</p> -->
    </main>
    <div class="dashboard">

        <div class="card">
            <h3>Total Products</h3>
            <p id="totalProducts">0</p>
        </div>

        <div class="card">
            <h3>Total Quantity</h3>
            <p id="totalQuantity">0</p>
        </div>

        <div class="card">
            <h3>Total Price</h3>
            <p id="totalPrice">₦0</p>
        </div>

    </div>


    <h2>Low Stock Products </h2>

    <table>
        <thead>
            <tr>
                <th>Name</th>
                <th>Quantity</th>
                <th>Price</th>
                <th>Status</th>
            </tr>
        </thead>

        <tbody id="recentTable"></tbody>
    </table>





    <script>
        const menuOpenBtn = document.getElementById('menuOpenBtn');
        const menuCloseBtn = document.getElementById('menuCloseBtn');
        const dashboardSidebar = document.getElementById('dashboardSidebar');
        const menuOverlay = document.getElementById('menuOverlay');

        const productDropdownBtn = document.getElementById('productDropdownBtn');
        const productSubmenu = document.getElementById('productSubmenu');
        const arrowIcon = document.getElementById('arrowIcon');

        // Drawer Sidebar Handlers
        function openSidebar() {
            dashboardSidebar.classList.add('active');
            menuOverlay.classList.add('active');
        }

        function closeSidebar() {
            dashboardSidebar.classList.remove('active');
            menuOverlay.classList.remove('active');
        }

        menuOpenBtn.addEventListener('click', openSidebar);
        menuCloseBtn.addEventListener('click', closeSidebar);
        menuOverlay.addEventListener('click', closeSidebar);

        // Submenu Accordion Handler
        productDropdownBtn.addEventListener('click', () => {
            productSubmenu.classList.toggle('open');
            arrowIcon.classList.toggle('rotate');
        });

        // Logout Function (Example)
        function logout() {
            // Clear any stored user data (e.g., localStorage, cookies)
            sessionStorage.clear();
            // Redirect to login page
            window.location.href = 'login.html';
        }


        function formatPrice(value) {
            return new Intl.NumberFormat("en-NG", {
                style: "currency",
                currency: "NGN",
                maximumFractionDigits: 0
            }).format(Number(value || 0));
        }

        async function loadDashboard() {
            const res = await fetch("http://localhost:3002/products");
            const products = await res.json();


            const totalProducts = products.length;

            const totalQuantity = products.reduce(
                (sum, p) => sum + p.quantity,
                0
            );

            const totalPrice = products.reduce(
                (sum, p) => sum + (p.quantity * p.price),
                0
            );

            document.getElementById("totalProducts").textContent = totalProducts;

            document.getElementById("totalQuantity").textContent = totalQuantity;

            document.getElementById("totalPrice").textContent =
                formatPrice(totalPrice);


            const lowStock = products.filter(p => p.quantity < 10);

            let html = "";

            lowStock.forEach(p => {
                let status = "";
                let className = "";

                if (p.quantity === 0) {
                    status = "Out of Stock";
                    className = "out";
                } else if (p.quantity < 6) {
                    status = "Very Low";
                    className = "very-low";
                } else {
                    status = "Low Stock";
                    className = "low";
                }

                html += `
      <tr>
        <td>${p.name}</td>
        <td>${p.quantity}</td>
        <td>${formatPrice(p.price)}</td>
        <td class="${className}">${status}</td>
      </tr>
    `;
            });

            document.getElementById("recentTable").innerHTML = html;
        }
        loadDashboard();

    </script>
</body>

</html>
