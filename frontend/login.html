<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <title>login Page</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: Arial, Helvetica, sans-serif;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            overflow-x: hidden;
        }

        form {
            background: black;
            padding: 25px;
            border-radius: 10px;
            width: 100%;
            max-width: 450px;
            animation: glowMove 4s infinite linear;
        }

        h2 {
            color: white;
            text-align: center;
            margin-bottom: 20px;
        }

        .password-icon {
            position: relative;
        }

        .password-icon i {
            position: absolute;
            right: 10px;
            top: 53%;
            transform: translateY(-50%);
            cursor: pointer;
            color: red;
            font-size: large;
            font-weight: bold;
        }

        .bg-video {
            position: absolute;

            top: 0;
            left: 0;

            width: 100%;
            height: 100%;

            object-fit: cover;

            z-index: -2;
        }

        /* DARK OVERLAY */
        .overlay {
            position: absolute;

            top: 0;
            left: 0;

            width: 100%;
            height: 100%;

            background: rgba(0, 0, 0, 0.55);

            z-index: -1;
        }

        @keyframes fadeUp {

            from {
                opacity: 0;
                transform: translateY(60px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        input {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            border: 1px solid #ccc;
            background-color: #ccc;
            border-radius: 5px;
            font-size: 16px;
            outline: none;
        }

        button {
            width: 100%;
            padding: 12px;
            background: green;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
        }

        button:hover {
            background: rgb(5, 44, 5);
        }

        /* tablets */
        @media screen and (max-width: 768px) {

            form {
                max-width: 90%;
                padding: 20px;
            }

            h2 {
                font-size: 24px;
            }

            input,
            button {
                font-size: 15px;
            }
        }

        /* mobile */
        @media screen and (max-width: 576px) {

            body {
                padding: 15px;
            }

            form {
                max-width: 100%;
                padding: 18px;
            }

            h2 {
                font-size: 22px;
            }

            input {
                padding: 11px;
                font-size: 14px;
            }

            button {
                padding: 11px;
                font-size: 14px;
            }

            .password-icon i {
                font-size: 18px;
                right: 12px;
            }
        }


        /* SMALL PHONE */
        @media screen and (max-width: 400px) {

            form {
                padding: 15px;
            }

            h2 {
                font-size: 20px;
            }

            input {
                padding: 10px;
                font-size: 13px;
            }

            button {
                padding: 10px;
                font-size: 13px;
            }

            .password-icon i {
                font-size: 16px;
            }
        }
    </style>
</head>

<body>

    <form action="" method="get">
        <h2>Login page</h2>
        <video autoplay muted loop playsinline class="bg-video">
            <source src="/assest/flour.mp4" type="video/mp4">
        </video>
        <div class="overlay"></div>
        <input type="email" id="email" placeholder="Enter email" required>
        <div class="password-icon">

            <input type="password" id="password" placeholder="Enter password" required>
            <i class="bi bi-eye" id="eyeicon"></i>
            <!-- <i class="bi bi-eye-slash" id="eyeicon"></i> -->
        </div>

        <button id="loginBtn">Login</button>
    </form>

    <script>
        let eyeicon = document.getElementById("eyeicon");
        let passwordInput = document.getElementById("password");

        eyeicon.onclick = function () {
            if (passwordInput.type === "password") {
                passwordInput.type = "text";
                eyeicon.classList.remove("bi-eye");
                eyeicon.classList.add("bi-eye-slash");
            } else {
                passwordInput.type = "password";
                eyeicon.classList.remove("bi-eye-slash");
                eyeicon.classList.add("bi-eye");
            }
        };

        const loginBtn = document.getElementById("loginBtn");
        loginBtn.addEventListener("click", async (e) => {
            e.preventDefault();

            const email = document.getElementById("email").value;
            const password = document.getElementById("password").value;

            if (!email || !password) {
                alert("Please fill in all fields");
                return;
            }

            try {
                const response = await fetch(
                    `http://localhost:3002/users?email=${encodeURIComponent(email)}&password=${encodeURIComponent(password)}`
                );

                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }

                const users = await response.json();

                if (users.length > 0) {
                    sessionStorage.setItem("user", JSON.stringify({ ...users[0], password: undefined }));

                    alert("Login Successful");
                    window.location.href = "dashboard.html";
                } else {
                    alert("Incorrect Email or Password");
                }
            } catch (error) {
                alert("Server Error");
                console.error("Fetch Error details:", error.message);
            }
        });
    </script>
</body>

</html>
