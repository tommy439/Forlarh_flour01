<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
    <title>Product List</title>
    <style>
        :root {
            --bg-color: #f4f6f9;
            --card-bg: #ffffff;
            --text-main: #333333;
            --text-muted: #777777;
            --primary: #4f46e5;

        }

        * {

            padding: 0;

            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            padding: 24px;
        }

        /* 
        .fixed-header {
            position: fixed;

            align-items: center;

        /* } */

        /* Search Bar  */
        .search-container {
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: relative;
            background-color: #f3f4f6;

        .fixed-header {
            position: fixed;

            height: 60px;
            background: #050b18;
            border-bottom: 1px solid #1e293b;

            display: flex;
            align-items: center;
            gap: 15px;

            padding: 0 20px;

            z-index: 100;
        }

        .menu-toggle-btn {

        }

            color: #fff;

            white-space: nowrap;

        }

        .search-container {
            flex: 1;
            max-width: 450px;

        }

        .search-container:focus-within {
            background-color: #ffffff;

        }

        .search-icon {
            width: 18px;

        .search-input {

            color: #1f2937;

        }

        .search-input::placeholder {

            background-color: #4f46e5;

            white-space: nowrap;
            transition: background-color 0.15s ease;
        }

        .search-btn:hover {
            background-color: #4338ca;
        }

        .menu-toggle-btn {
            background: none;
            border: none;
            color: #f8fafc;
            font-size: 22px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 8px;

            transition: 0.2s;

        }

        .header-title {

        }

        .sidebar-overlay {

            left: 0;
            width: 100vw;
            height: 100vh;
            background-color: rgba(15, 23, 42, 0.7);

            opacity: 0;
            visibility: hidden;
            transition: opacity 0.3s ease, visibility 0.3s ease;
        }

        .sidebar-overlay.active {
            opacity: 1;
            visibility: visible;
        }

        .sidebar {
            position: fixed;
            top: 0;

        .sidebar.active {

        .logo-area {

        .close-container {

        }

        .logo-text {

            font-weight: bold;

        }

        .nav-links {

            flex-direction: column;

        .nav-item {

            align-items: center;
            justify-content: space-between;
            padding: 10px 12px;

            color: #94a3b8;

            font-size: 15px;

        .nav-item-left {

        .nav-item.active {
            background-color: #2563eb;
            color: #ffffff;
        }

            color: #ffffff;
        }

        .submenu {
            max-height: 0;
            overflow: hidden;

            padding-left: 32px;
            display: flex;
            flex-direction: column;
            gap: 2px;

        .submenu.open {
            max-height: 200px;

            margin-bottom: 8px;

        .submenu-item {
            display: block;
            padding: 8px 12px;
            color: #94a3b8;
            text-decoration: none;
            font-size: 14px;
            border-radius: 6px;
            transition: 0.2s;
        }

        .submenu-item:hover {
            background-color: #1e293b;
            color: #ffffff;
        }

        .dropdown-arrow {
            font-size: 11px;
            transition: transform 0.3s;
        }

        .dropdown-arrow.rotate {
            transform: rotate(180deg);

            display: flex;

        .main-workspace {

        }

            width: 100%;

            padding: 12px;

        }

        .dashboard-table1 tbody tr:hover {

        }

        .status {
            padding: 2px 8px;

            color: #b91c1c;

            display: inline-block;

        }

        .image-wrapper {
            position: relative;

        }

        }

        .delete-image-btn {
            position: absolute;

            opacity: 0;

        }

        .image-wrapper:hover .delete-image-btn {

        }

        .status1 {
            padding: 2px 8px;

            display: inline-block;

        .header-2 {

        }

        .btn {

        .btn-primary {

        }

        .table-responsive {
            width: 100%;

        }

        .dashboard-table2 {
            width: 100%;
            min-width: 900px;
            border-collapse: collapse;
            background: #fff;
        }

        .dashboard-table2 th,
        .dashboard-table2 td {
            padding: 12px;

        }

        /* tablets */
        @media screen and (max-width:1024px) {

            body {
                padding: 15px;

            }

            .fixed-header {
                height: auto;
                display: flex;
                flex-wrap: wrap;
                align-items: center;
                gap: 10px;
                padding: 10px 15px;
            }

            .menu-toggle-btn {
                flex-shrink: 0;
                order: 1;
            }

            .header-title {
                order: 2;
                font-size: 16px;
                margin-left: 0;
                white-space: nowrap;
                flex: 1;
            }

            .search-container {
                order: 3;
                width: 100%;

            }

            }

            .table-responsive {
                overflow-x: auto;
            }

            .dashboard-table2 {
                min-width: 900px;
            }
        }
    </style>
</head>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>


<script>


    const supabaseUrl = 'https://prkhwwfrfuemgmrvqfqf.supabase.co'


    const supabaseKey = "sb_publishable_oqK9e7alY-e8JsnFhqYAcQ_alJBrz1T";

    const supabaseClient = supabase.createClient(
        supabaseUrl,
        supabaseKey
    );

    const menuOpenBtn = document.getElementById('menuOpenBtn');
    const menuCloseBtn = document.getElementById('menuCloseBtn');
    const dashboardSidebar = document.getElementById('dashboardSidebar');
    const menuOverlay = document.getElementById('menuOverlay');

    const productDropdownBtn = document.getElementById('productDropdownBtn');
    const productSubmenu = document.getElementById('productSubmenu');
    const arrowIcon = document.getElementById('arrowIcon');

    // Drawer Sidebar Handlers
    function openSidebar() {
        dashboardSidebar.classList.add('active');
        menuOverlay.classList.add('active');
    }

    function closeSidebar() {
        dashboardSidebar.classList.remove('active');
        menuOverlay.classList.remove('active');
    }

    menuOpenBtn.addEventListener('click', openSidebar);
    menuCloseBtn.addEventListener('click', closeSidebar);
    menuOverlay.addEventListener('click', closeSidebar);

    // Submenu Accordion Handler
    productDropdownBtn.addEventListener('click', () => {
        productSubmenu.classList.toggle('open');
        arrowIcon.classList.toggle('rotate');
    });
    const authUser = sessionStorage.getItem("user");
    if (authUser) {
        const user = JSON.parse(authUser);
        document.getElementById("userName").textContent = user.name || "Folarh Venture";
        document.getElementById("userEmail").textContent = user.email || "Unknown";
        document.getElementById("avatar").textContent = (user.name?.charAt(0)?.toUpperCase() + user.name?.split(" ")[1]?.charAt(0)?.toUpperCase()) || "FV";
        document.getElementById("avatar").style.backgroundColor = "#4f46e5";
    } else {
        document.getElementById("userName").textContent = "Folarh Venture";
        document.getElementById("userEmail").textContent = "alamintomori01@gmail.com";
        document.getElementById("avatar").textContent = "FV";
        document.getElementById("avatar").style.backgroundColor = "#4f46e5";
    }
    const API_URL = "https://forlarh-flour01-1.onrender.com/products";
    const tableBody = document.getElementById("productsTableBody");
    const refreshBtn = document.getElementById("refreshBtn");

    let editingId = null;
    let originalRowData = null;

    function formatPrice(value) {
        return new Intl.NumberFormat("en-NG", {
            style: "currency",
            currency: "NGN",
            maximumFractionDigits: 0
        }).format(Number(value || 0));
    }

    async function fetchProducts() {
        const res = await fetch(API_URL);
        const products = await res.json();

        tableBody.innerHTML = "";

        products.forEach(product => {
            const row = document.createElement("tr");
            const imageSrc = product.image ? product.image : "https://placeholder.com";

            row.innerHTML = `
            <td>
                    <div class="image-wrapper">
                        <img src="${imageSrc}" alt="${product.name}" class="product-image">

                        <button
                            class="delete-image-btn"
                            onclick="deleteImage('${product.id}')">
                            🗑
                        </button>
                    </div>
                </td>
            <td>${product.id}</td>
            <td>${product.name}</td>
            <td>${product.description}</td>
            <td data-price="${product.price}">${formatPrice(product.price)}</td>
            <td>${product.category}</td>
            <td>${product.quantity}</td>
            <td>
                <button class="btn btn-primary" onclick="editRow('${product.id}', this)">Edit</button>
                <button class="btn btn-danger" onclick="deleteProduct('${product.id}')">Delete</button>
            </td>
        `;

            tableBody.appendChild(row);
        });
    }


    refreshBtn.addEventListener("click", fetchProducts);

    async function deleteProduct(id) {
        if (!confirm("Delete this product?")) return;

        await fetch(`${API_URL}/${id}`, {
            method: "DELETE"
        });

        fetchProducts();
    }

    function editRow(id, btn) {
        const row = btn.closest("tr");

        if (editingId && editingId !== id) {
            alert("Finish current edit first!");
            return;
        }

        editingId = id;

        const cells = row.querySelectorAll("td");
        const currentImage = row.querySelector(".product-image")?.src || "";

        row.innerHTML = `
        <td>
            <img
                src="${currentImage}"
                style="width:50px;height:50px;object-fit:cover;border-radius:4px;"
            >
            <br><br>
            <input type="file" id="image" accept="image/*">
        </td>

        <td>${id}</td>

        <td><input id="name" value="${cells[2].innerText}" /></td>

        <td><input id="description" value="${cells[3].innerText}" /></td>

        <td>
            <input
                id="price"
                type="number"
                step="0.01"
                value="${cells[4].dataset.price || 0}"
            />
        </td>

        <td><input id="category" value="${cells[5].innerText}" /></td>

        <td><input id="quantity" value="${cells[6].innerText}" /></td>

        <td>
            <button class="btn btn-primary" onclick="saveEdit('${id}')">
                Save
            </button>

            <button class="btn btn-danger" onclick="cancelEdit()">
                Cancel
            </button>
        </td>
    `;
    }


    async function saveEdit(id) {

        const updatedProduct = {
            name: document.getElementById("name").value,
            description: document.getElementById("description").value,
            price: Number(document.getElementById("price").value),
            category: document.getElementById("category").value,
            quantity: Number(document.getElementById("quantity").value)
        };

        const imageFile = document.getElementById("image")?.files[0];

        if (imageFile) {

            const fileName = `${Date.now()}-${imageFile.name}`;

            const { error: uploadError } =
                await supabaseClient.storage
                    .from("products")
                    .upload(fileName, imageFile);

            if (uploadError) {
                alert(uploadError.message);
                return;
            }

            const { data: urlData } =
                supabaseClient.storage
                    .from("products")
                    .getPublicUrl(fileName);

            updatedProduct.image = urlData.publicUrl;
        }

        await fetch(`${API_URL}/${id}`, {
            method: "PATCH",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify(updatedProduct)
        });

        editingId = null;
        fetchProducts();
    }
    async function deleteImage(id) {
        if (!confirm("Delete this image?")) return;

        await fetch(`${API_URL}/${id}`, {
            method: "PATCH",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                image: ""
            })
        });

        fetchProducts();
    }




    fetchProducts();
</script>
